    - data:
        code: "import json\n\ndef main(body: str) -> dict:\n    data = json.loads(body)\n\
          \    has_error = data[\"has_error\"]\n    survey_text_for_llm = data.get(\"\
          survey_text_for_llm\", \"\")\n\n    # error_log を Markdown 表形式に変換\n    error_log_md\
          \ = \"\"\n    if has_error and data[\"error_log\"]: \n        headers =\
          \ [\n            \"sheet_name\", \"row_no\", \"rule_id\", \"category\",\n\
          \            \"item_name\", \"check_item\", \"severity\",\n            \"\
          error_message\", \"fix_action\"\n        ]\n        error_log_md = \"| \"\
          \ + \" | \".join(headers) + \" |\\n\"\n        error_log_md += \"| \" +\
          \ \" | \".join([\"---\"] * len(headers)) + \" |\\n\"\n        for row in\
          \ data[\"error_log\"]:  \n            values = [str(row.get(h, \"\")) for\
          \ h in headers]\n            error_log_md += \"| \" + \" | \".join(values)\
          \ + \" |\\n\"\n\n    # gis_summary を Markdown 表形式に変換\n    gis_summary_md\
          \ = \"\"\n    if not has_error and data[\"gis_summary\"]: \n        headers\
          \ = [\n            \"調査ID\", \"シート名\", \"地域名\", \"調査日時\", \"天気\",\n    \
          \        \"記帳者\", \"対象樹種\", \"面積(㎡)\", \"斜面位置\", \"斜面方位\",\n           \
          \ \"傾斜度\", \"緯度\", \"経度\",\n            \"平均樹高(m)\", \"平均枝下高(m)\", \"平均胸高直径(cm)\"\
          , \"立木本数\"\n        ]\n        gis_summary_md = \"| \" + \" | \".join(headers)\
          \ + \" |\\n\"\n        gis_summary_md += \"| \" + \" | \".join([\"---\"\
          ] * len(headers)) + \" |\\n\"\n        for row in data[\"gis_summary\"]:\
          \ \n            values = [str(row.get(h, \"\")) for h in headers]\n    \
          \        gis_summary_md += \"| \" + \" | \".join(values) + \" |\\n\"\n\n\
          \    return {\n        \"has_error\": has_error,\n        \"status\": \"\
          error\" if has_error else \"success\",\n        \"error_count\": data[\"\
          error_count\"],\n        \"error_log_md\": error_log_md,\n        \"gis_summary_md\"\
          : gis_summary_md,\n        \"survey_text_for_llm\": survey_text_for_llm,\n\
          \    }"
