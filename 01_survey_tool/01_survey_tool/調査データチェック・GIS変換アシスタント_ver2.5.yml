    - data:
        code: "import json\n\ndef main(existing_error_md: str, llm_error_json: str)\
          \ -> dict:\n    \n    # LLMが出力したJSONを読み込む（失敗したら空リストにする）\n    try:\n    \
          \    llm_errors = json.loads(llm_error_json.strip())\n    except Exception:\n\
          \        llm_errors = []\n\n    # LLMエラーをMarkdown表に変換する\n    llm_error_md\
          \ = \"\"\n    if llm_errors:\n        headers = [\n            \"sheet_name\"\
          , \"row_no\", \"rule_id\", \"category\",\n            \"item_name\", \"\
          check_item\", \"severity\",\n            \"error_message\", \"fix_action\"\
          \n        ]\n        llm_error_md = \"| \" + \" | \".join(headers) + \"\
          \ |\\n\"\n        llm_error_md += \"| \" + \" | \".join([\"---\"] * len(headers))\
