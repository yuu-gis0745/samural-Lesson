          text: "## エラー情報 \n### エラー件数\n{{#1780371392037.error_count#}}件 \n\n### エラー内容\n\
            {{#1780442733681.combined_error_md#}}\n\n## 命令\n以下の2つを順番に回答してください。\n\n\
            ### 1. 既存エラーの修正方法\n「check_rules_forest_survey.csv」を元に特定した上記のエラーについて、経験のない人でも理解できるよう\n\
            具体的な修正方法を指示してください。\n\n### 2. その他気になる点\n上記エラー以外に、数値の矛盾や入力ミスと思われる点があれば指摘してください。なければ「なし」と出力してください。\n\
            \n### 制約\n- 専門用語は使わないようにしてください。\n- 修正後の数値や選択肢そのものの提案はしないでください。\n- 修正を行う理由についても、説明してください。"
