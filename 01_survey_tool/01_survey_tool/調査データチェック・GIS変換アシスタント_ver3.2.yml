        - edition_type: basic
          id: 276f44e5-8d8d-401d-acd9-fa115561942f
          role: user
          text: "- ## OCR警告\n{{#1780735730593.ocr_warning_text#}}\n\n※警告があるページは読み取りが不完全な可能性があります。該当ページの項目は積極的に\
            \ \"OCR_UNREADABLE\" を使用してください。\n\n## OCRテキスト\n{{#1780735730593.ocr_text#}}\n\
            \n## 前提条件\n- 紙に手書きで記載した文字や数字をOCRで抽出しております。\n- 二重の取り消し線や乱雑な字で記載されている場合がございます。\n\
            - 汚れや折れ、破れがある場合がございます。\n\n## 絶対条件\n以下の条件を絶対に守ってください。\n- 値を確認できない場合は null\
            \ を出力してください。\n- 数値項目についても、確認できない場合は 0 ではなく null を出力してください。\n- ただし、OCRテキストに文字や数字の痕跡はあるが判読できない場合は、null\
            \ ではなく \"OCR_UNREADABLE\" を出力してください。\n\n## 指定のJSON形式\n{\n  \"plots\":\
            \ [\n    {\n      \"調査ID\": null, \"地域名\": null, \"調査日時\": null, \"天気\"\
            : null,\n      \"記帳者\": null, \"対象樹種\": null, \"面積(㎡)\": null,\n     \
            \ \"斜面位置\": null, \"斜面方位\": null, \"傾斜度\": null, \"緯度\": null, \"経度\"\
            : null,\n      \"trees\": [\n        {\"番号\": null, \"樹種\": null, \"樹高(m)\"\
            : null, \"枝下高(m)\": null,\n         \"胸高直径(cm)\": null, \"異常区分\": null,\
            \ \"被害区分\": null, \"備考\": \"\"}\n      ]\n    }\n  ]\n}"
