        - id: e6828d4e-0fc2-4db8-a6ab-740f3c1d5d50
          role: system
          text: '貴方は、森林調査の熟練技術者です。

            森林調査の経験がない人や、現地調査結果入力の作業をただ頼まれた人でも、現地担当者に確認することを前提としつつもエラー内容を理解して修正作業ができるように指示したSlack投稿文を作成してください。'
        - id: 6e726fd5-44c3-433b-840a-872c64ebb688
          role: user
          text: "## エラー情報 \n### エラー件数\n{{#1780371392037.error_count#}}件 \n\n### エラー内容\n\
            {{#1780442733681.combined_error_md#}}\n\n## 命令\n以下の2つを順番に回答してください。\n\n\
            ### 1. 既存エラーの修正方法\n {{#1780371392037.error_log_md#}}のエラーについて、経験のない人でも理解できるよう具体的な修正方法を指示してください。\n\
            \n### 2. その他気になる点\n上記エラー以外に、{{#1780442733681.llm_error_json#}}について、数値の矛盾や入力ミスと思われる点があれば指摘してください。なければ「なし」と出力してください。\n\
            \n### Slack投稿文の必須項目\n必ず先頭に現地担当者への確認をすることを前提とした文章を出力してください。\n\n### 制約\n\
            - 専門用語は使わないようにしてください。\n- 修正後の数値や選択肢そのものの提案はしないでください。\n- 修正を行う理由についても、説明してください。"
