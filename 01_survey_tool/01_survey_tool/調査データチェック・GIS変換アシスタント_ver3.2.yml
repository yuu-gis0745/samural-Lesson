            \  {\n    \"sheet_name\": \"シート名\",\n    \"row_no\": \"行番号または基本情報\",\n\
            \    \"rule_id\": \"R_LLM_001\",\n    \"category\": \"毎木または基本情報\",\n \
            \   \"check_item\": \"チェック内容の説明\",\n    \"target_column\": \"エラーのある項目名\"\
            ,\n    \"condition\": \"エラーと判断する条件\",\n    \"severity\": \"warning\",\n\
            \    \"message\": \"エラーの説明\",\n    \"fix_action\": \"修正方法\"\n    \"note\"\
            : \"\"\n  }\n]"
